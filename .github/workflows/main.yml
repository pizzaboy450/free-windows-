name: Windows noVNC via Cloudflare

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Install VNC Server and noVNC
        shell: powershell
        run: |
          # 1. Install TightVNC (The 'Engine')
          choco install tightvnc -y
          
          # 2. Set VNC Password (Required)
          $pass = "P@ssw0rd123!"
          # TightVNC uses a specific registry key for the password
          # We'll set the password to 'password' for simplicity in this script
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlservice -setpassword "password"
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlservice -start

      - name: Setup WebSocks Bridge (noVNC)
        shell: powershell
        run: |
          # Download a portable noVNC/websockify environment
          choco install nodejs -y
          npm install -g websockify
          
          # Start websockify: Listen on 8080, forward to VNC on 5900
          Start-Process "websockify" -ArgumentList "8080 localhost:5900" -WindowStyle Hidden

      - name: Setup TryCloudflare Tunnel
        shell: powershell
        run: |
          curl.exe -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi -o cloudflared.msi
          Start-Process msiexec.exe -ArgumentList "/i cloudflared.msi /quiet /qn" -Wait
          
          Write-Host "Starting TryCloudflare tunnel..."
          $logFile = "cloudflared_err.log"
          # Tunnel port 8080 (the noVNC port)
          Start-Process "C:\Program Files (x86)\cloudflared\cloudflared.exe" -ArgumentList "tunnel --url http://localhost:8080" -RedirectStandardError $logFile
          
          $maxRetries = 20
          $url = ""
          while ($url -eq "" -and $retryCount -lt $maxRetries) {
              Start-Sleep -Seconds 5
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile
                  $line = $content | Select-String -Pattern "https://.*\.trycloudflare\.com"
                  if ($line) { $url = [regex]::Match($line, "https://.*\.trycloudflare\.com").Value }
              }
              $retryCount++
          }

          if ($url -ne "") {
              Write-Host "=========================================="
              Write-Host "ACCESS YOUR WINDOWS VNC AT:"
              Write-Host "$url"
              Write-Host "VNC PASSWORD: password"
              Write-Host "=========================================="
          }
          
          while($true) { Start-Sleep -Seconds 60 }
