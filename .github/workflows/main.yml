name: Windows Server Stream
on: 
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  stream:
    runs-on: windows-latest
    steps:
      - name: Download Splashtop Streamer
        shell: powershell
        run: |
          # Download the official Splashtop Streamer installer
          Invoke-WebRequest -Uri "https://download.splashtop.com" -OutFile "streamer.exe"

      - name: Install and Configure Splashtop
        shell: cmd
        run: |
          :: Use your 12-digit deployment code for silent installation
          :: Replace YOUR_DEPLOYMENT_CODE with your actual code from Splashtop console
          streamer.exe preid=YOUR_DEPLOYMENT_CODE /s /i noshortcut=1

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "Splashtop is running. You can now connect via the Splashtop website or app."
          Write-Host "The session will stay active for up to 6 hours or until the job is cancelled."
          # Loop to prevent the action from completing immediately
          while($true) { Start-Sleep -Seconds 60 }
