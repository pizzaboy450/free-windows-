- name: Setup ngrok & Tunnel Web Port
        shell: powershell
        run: |
          # Install ngrok
          choco install ngrok -y
          
          # Authenticate
          ngrok config add-authtoken $env:NGROK_AUTH_TOKEN
          
          # Start ngrok in background
          Write-Host "Starting ngrok tunnel..."
          Start-Process ngrok -ArgumentList "http 80 --log=stdout"
          
          # RETRY LOOP: Wait for the ngrok API to become available
          $maxRetries = 10
          $retryCount = 0
          $url = ""
          
          while ($url -eq "" -and $retryCount -lt $maxRetries) {
              try {
                  Start-Sleep -Seconds 5
                  $ngrokApi = Invoke-WebRequest -Uri http://localhost:4040/api/tunnels -UseBasicParsing | ConvertFrom-Json
                  $url = $ngrokApi.tunnels[0].public_url
              } catch {
                  $retryCount++
                  Write-Host "Waiting for ngrok API... (Attempt $retryCount)"
              }
          }

          if ($url -ne "") {
              Write-Host "=========================================="
              Write-Host "ACCESS YOUR WINDOWS WEB RDP AT:"
              Write-Host "$url/myrtille"
              Write-Host "LOGIN: runneradmin / P@ssw0rd123!"
              Write-Host "=========================================="
          } else {
              Write-Error "Failed to get ngrok URL after $maxRetries attempts."
              exit 1
          }
          
          # Keep-Alive Loop (6 hours)
          $i = 0
          while($i -lt 360) {
            Start-Sleep -Seconds 60
            $i++
            Write-Host "Session active... Minute: $i"
          }
        env:
          NGROK_AUTH_TOKEN: "37l1QIrQAcIgObkcpyBFAHvdjWr_3wVjmVQ9EQTRyj3V8pUxV"
