name: Windows noVNC Standalone Fix

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Install UltraVNC & Setup Config
        shell: powershell
        run: |
          # 1. Install UltraVNC
          choco install ultravnc -y
          
          # 2. Create the config file in the install directory
          # Using 'password' (hex: 4cf1762c5e53) and enabling loopback
          $vncDir = "C:\Program Files\uvnc bvba\UltraVNC"
          $configContent = @"
          [Permissions]
          [Admin]
          AllowLoopback=1
          LoopbackOnly=0
          Password=4cf1762c5e53
          [UltraVNC]
          port=5900
          "@
          Set-Content -Path "$vncDir\ultravnc.ini" -Value $configContent
          
          # 3. Start winvnc.exe as a background process (NOT a service)
          Write-Host "Starting UltraVNC as standalone process..."
          Start-Process "$vncDir\winvnc.exe" -ArgumentList "-run" -WindowStyle Hidden
          Start-Sleep -Seconds 5

      - name: Setup Python & noVNC Bridge
        shell: powershell
        run: |
          choco install python -y
          refreshenv
          python -m pip install websockify
          
          mkdir C:\noVNC
          Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip" -OutFile "C:\novnc.zip"
          Expand-Archive -Path "C:\novnc.zip" -DestinationPath "C:\noVNC"
          
          $vncPath = Get-ChildItem -Path "C:\noVNC\noVNC-*" | Select-Object -ExpandProperty FullName
          Copy-Item "$vncPath\vnc.html" "$vncPath\index.html"
          
          # Start Bridge: Web(8080) -> UltraVNC(5900)
          Start-Process python -ArgumentList "-m websockify 8080 127.0.0.1:5900 --web $vncPath" -WindowStyle Hidden
          Start-Sleep -Seconds 15
          
          # Quick health check
          $check = Test-NetConnection -ComputerName 127.0.0.1 -Port 8080
          if (!$check.TcpTestSucceeded) { Write-Error "Bridge failed to start"; exit 1 }

      - name: Setup TryCloudflare Tunnel
        shell: powershell
        run: |
          curl.exe -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi -o cloudflared.msi
          Start-Process msiexec.exe -ArgumentList "/i cloudflared.msi /quiet /qn" -Wait
          
          $logFile = "cloudflared_err.log"
          Start-Process "C:\Program Files (x86)\cloudflared\cloudflared.exe" -ArgumentList "tunnel --url http://127.0.0.1:8080" -RedirectStandardError $logFile
          
          $maxRetries = 20
          $url = ""
          $retry = 0
          while ($url -eq "" -and $retry -lt $maxRetries) {
              Start-Sleep -Seconds 5
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile
                  $line = $content | Select-String -Pattern "https://.*\.trycloudflare\.com"
                  if ($line) { $url = [regex]::Match($line, "https://.*\.trycloudflare\.com").Value }
              }
              $retry++
          }

          if ($url -ne "") {
              Write-Host "=========================================="
              Write-Host "VNC URL (AUTO-CONNECT):"
              Write-Host "$url/index.html?autoconnect=true&password=password"
              Write-Host "=========================================="
          } else {
              exit 1
          }
          
          while($true) { Start-Sleep -Seconds 60 }
