name: MeshCentral Browser Desktop

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Launch MeshCentral Agent
        shell: powershell
        run: |
          # 1. Download the MeshCentral Assistant (The 'Agent')
          # This acts exactly like the Chrome Remote Desktop 'host'
          Invoke-WebRequest -Uri "https://meshcentral.com/downloads/MeshAssistant-x64.exe" -OutFile "MeshAssistant.exe"
          
          # 2. Start it silently
          Start-Process ./MeshAssistant.exe -ArgumentList "-silent" -WindowStyle Hidden
          Start-Sleep -Seconds 10
          
      - name: Setup Cloudflare Tunnel
        shell: powershell
        run: |
          # 3. Get Cloudflare
          curl.exe -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi -o cloudflared.msi
          Start-Process msiexec.exe -ArgumentList "/i cloudflared.msi /quiet /qn" -Wait
          
          # 4. Tunnel the local Mesh interface
          Start-Process "C:\Program Files (x86)\cloudflared\cloudflared.exe" -ArgumentList "tunnel --url http://127.0.0.1:80" -RedirectStandardError tunnel.log
          
          # 5. Extract the Link
          $url = ""
          while ($url -eq "") {
              Start-Sleep -Seconds 5
              if (Test-Path tunnel.log) {
                  $url = (Get-Content tunnel.log | Select-String -Pattern "https://.*\.trycloudflare\.com").Matches.Value
              }
          }

          Write-Host "=========================================="
          Write-Host "CLICK THIS LINK FOR BROWSER ACCESS:"
          Write-Host "$url"
          Write-Host "=========================================="
          
          while($true) { Start-Sleep -Seconds 60 }
