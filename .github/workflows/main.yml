name: Windows TigerVNC Fixed

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Install TigerVNC and Node.js
        shell: powershell
        run: |
          # 1. Install TigerVNC (The Headless King)
          choco install tigervnc nodejs -y
          
          # 2. Start TigerVNC as a user process (No Service = No Loopback Error)
          # Use -SecurityTypes None for the bridge (Websockify handles the pass)
          $vncPath = "C:\Program Files\TigerVNC\vncserver.exe"
          Start-Process $vncPath -ArgumentList "-SecurityTypes None -localhost 1" -WindowStyle Hidden
          Start-Sleep -Seconds 10

      - name: Setup WebSocket Proxy
        shell: powershell
        run: |
          npm install -g websockify
          # Start bridge: Web(8080) -> TigerVNC(5901)
          Start-Process websockify -ArgumentList "8080 localhost:5901" -WindowStyle Hidden
          
          # Verification: Ensure port 8080 is open
          $retry = 0
          while ($retry -lt 10) {
              $check = Test-NetConnection -ComputerName 127.0.0.1 -Port 8080
              if ($check.TcpTestSucceeded) { Write-Host "Bridge is UP"; break }
              $retry++
              Start-Sleep -Seconds 3
          }

      - name: Setup TryCloudflare Tunnel
        shell: powershell
        run: |
          curl.exe -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi -o cloudflared.msi
          Start-Process msiexec.exe -ArgumentList "/i cloudflared.msi /quiet /qn" -Wait
          
          Write-Host "Starting Tunnel..."
          $logFile = "cloudflared_err.log"
          Start-Process "C:\Program Files (x86)\cloudflared\cloudflared.exe" -ArgumentList "tunnel --url http://127.0.0.1:8080" -RedirectStandardError $logFile
          
          $maxRetries = 20
          $url = ""
          while ($url -eq "" -and $retryCount -lt $maxRetries) {
              Start-Sleep -Seconds 5
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile
                  $line = $content | Select-String -Pattern "https://.*\.trycloudflare\.com"
                  if ($line) { $url = [regex]::Match($line, "https://.*\.trycloudflare\.com").Value }
              }
              $retryCount++
          }

          if ($url -ne "") {
              $wsHost = $url -replace "https://", ""
              Write-Host "=========================================="
              Write-Host "CONNECT VIA noVNC DEMO:"
              Write-Host "1. Go to: https://novnc.com/noVNC/vnc.html"
              Write-Host "2. Settings -> Transport: WebSockets"
              Write-Host "3. Host: $wsHost"
              Write-Host "4. Port: 443 | Encrypt: Checked"
              Write-Host "5. Password: [NONE/BLANK]"
              Write-Host "=========================================="
          }
          
          while($true) { Start-Sleep -Seconds 60 }
