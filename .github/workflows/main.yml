name: Windows Server Stream
on: 
  workflow_dispatch:

jobs:
  stream:
    runs-on: windows-latest
    steps:
      - name: Download Splashtop Streamer
        shell: powershell
        run: |
          # Adding a User-Agent header bypasses the 403 Forbidden error
          $url = "https://download.splashtop.com"
          $userAgent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
          Invoke-WebRequest -Uri $url -UserAgent $userAgent -OutFile "streamer.exe"

      - name: Install and Configure Splashtop
        shell: cmd
        run: |
          :: Replace YOUR_DEPLOYMENT_CODE with your 12-digit code
          streamer.exe preid=YOUR_DEPLOYMENT_CODE /s /i noshortcut=1

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "Splashtop is ready. Connect via the Splashtop app/portal."
          while($true) { Start-Sleep -Seconds 60 }

