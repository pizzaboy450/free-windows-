- name: Download & Install RustDesk
        shell: powershell
        run: |
          # Use curl for a faster, more reliable download
          # Updated to the latest stable 1.3.7 64-bit link
          $url = "https://github.com/rustdesk/rustdesk/releases/download/1.3.7/rustdesk-1.3.7-x86_64.exe"
          
          Write-Host "Starting download..."
          curl.exe -L -o "rustdesk.exe" "$url"
          
          if (Test-Path "rustdesk.exe") {
              Write-Host "Download successful. Installing..."
              Start-Process .\rustdesk.exe -ArgumentList "--silent-install" -Wait
              Start-Sleep -Seconds 15
          } else {
              Write-Error "Download failed! File not found."
              exit 1
          }
