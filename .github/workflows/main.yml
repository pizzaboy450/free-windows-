name: Ultimate Browser Desktop (No Apps)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Setup Virtual Desktop & Web Bridge
        shell: powershell
        run: |
          # 1. Download the all-in-one GoVNC binary
          # This handles the screen capture AND the browser website in one file.
          Invoke-WebRequest -Uri "https://github.com/m1k1o/neko/releases/download/v2.10.0/neko_windows_amd64.exe" -OutFile "neko.exe"
          
          # 2. Start it on port 8080
          # Password is set to 'password'
          Start-Process ./neko.exe -ArgumentList "server --bind 127.0.0.1:8080 --password password" -WindowStyle Hidden
          Start-Sleep -Seconds 10

      - name: Setup Browser Link
        shell: powershell
        run: |
          # 3. Use Cloudflare to get the URL
          curl.exe -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi -o cloudflared.msi
          Start-Process msiexec.exe -ArgumentList "/i cloudflared.msi /quiet /qn" -Wait
          
          $logFile = "tunnel.log"
          Start-Process "C:\Program Files (x86)\cloudflared\cloudflared.exe" -ArgumentList "tunnel --url http://127.0.0.1:8080" -RedirectStandardError $logFile
          
          $url = ""
          while ($url -eq "") {
              Start-Sleep -Seconds 5
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile
                  if ($content -match "https://[a-zA-Z0-9-]+\.trycloudflare\.com") {
                      $url = $matches[0]
                  }
              }
          }

          Write-Host "=========================================="
          Write-Host "CLICK THIS LINK FOR BROWSER ACCESS:"
          Write-Host "$url"
          Write-Host "PASSWORD: password"
          Write-Host "=========================================="
          
          while($true) { Start-Sleep -Seconds 60 }
