name: Windows noVNC Pure Bridge

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Install VNC with Loopback Fix
        shell: powershell
        run: |
          # 1. Install TightVNC
          choco install tightvnc -y
          
          # 2. Fix 'Loopback connections not enabled' by allowing 127.0.0.1
          $regPath = "HKLM:\Software\TightVNC\Server"
          if (!(Test-Path $regPath)) { New-Item -Path $regPath -Force }
          Set-ItemProperty -Path $regPath -Name "AllowLoopback" -Value 1 -Type DWord
          Set-ItemProperty -Path $regPath -Name "LoopbackOnly" -Value 0 -Type DWord
          
          # 3. Set Password and Start
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlservice -setpassword "password"
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlservice -start

      - name: Setup Python & noVNC
        shell: powershell
        run: |
          # 1. Install Python & Bridge Tool
          choco install python -y
          refreshenv
          python -m pip install websockify
          
          # 2. Download noVNC Web Files
          mkdir C:\noVNC
          Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip" -OutFile "C:\novnc.zip"
          Expand-Archive -Path "C:\novnc.zip" -DestinationPath "C:\noVNC"
          
          # 3. Map vnc.html to index.html for root access
          $vncPath = Get-ChildItem -Path "C:\noVNC\noVNC-*" | Select-Object -ExpandProperty FullName
          Copy-Item "$vncPath\vnc.html" "$vncPath\index.html"
          
          # 4. Start Bridge: Web(8080) -> VNC(5900)
          Start-Process python -ArgumentList "-m websockify 8080 localhost:5900 --web $vncPath" -WindowStyle Hidden
          Start-Sleep -Seconds 15

      - name: Setup TryCloudflare Tunnel
        shell: powershell
        run: |
          # Install Cloudflared
          curl.exe -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi -o cloudflared.msi
          Start-Process msiexec.exe -ArgumentList "/i cloudflared.msi /quiet /qn" -Wait
          
          # Start Tunnel
          Write-Host "Starting Tunnel..."
          $logFile = "cloudflared_err.log"
          Start-Process "C:\Program Files (x86)\cloudflared\cloudflared.exe" -ArgumentList "tunnel --url http://127.0.0.1:8080" -RedirectStandardError $logFile
          
          # Extract URL
          $maxRetries = 20
          $url = ""
          $retry = 0
          while ($url -eq "" -and $retry -lt $maxRetries) {
              Start-Sleep -Seconds 5
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile
                  $line = $content | Select-String -Pattern "https://.*\.trycloudflare\.com"
                  if ($line) { $url = [regex]::Match($line, "https://.*\.trycloudflare\.com").Value }
              }
              $retry++
          }

          if ($url -ne "") {
              Write-Host "=========================================="
              Write-Host "VNC URL (AUTO-CONNECT):"
              Write-Host "$url/index.html?autoconnect=true&password=password"
              Write-Host "=========================================="
          } else {
              Write-Error "Cloudflare failed to generate a link."
              exit 1
          }
          
          # 6-Hour Keep-Alive
          while($true) { Start-Sleep -Seconds 60 }
