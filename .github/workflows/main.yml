name: Windows Server Stream via Splashtop

on:
  workflow_dispatch:

jobs:
  run-windows-splashtop:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step: Download Splashtop Streamer installer (example, replace with actual URL)
    - name: Download Splashtop Installer
      run: |
        Invoke-WebRequest -Uri "https://www.splashtop.com/download/Streamer" -OutFile "Splashtop_Streamer.exe"

    # Step: Install Splashtop silently
    - name: Install Splashtop
      run: |
        Start-Process -FilePath "Splashtop_Streamer.exe" -ArgumentList "/silent" -Wait

    # Step: Start Splashtop (replace with actual path if needed)
    - name: Start Splashtop
      run: |
        Start-Process "C:\Program Files (x86)\Splashtop\Splashtop Remote Agent\SRApp.exe"

    # Optional: Keep runner alive (limited)
    - name: Keep Runner Alive
      run: |
        Write-Host "Splashtop started. Runner will wait..."
        Start-Sleep -Seconds 3600  # wait for 1 hour
