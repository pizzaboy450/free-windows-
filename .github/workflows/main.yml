name: Full Windows VM Browser Stream
on: workflow_dispatch

jobs:
  stream:
    runs-on: windows-latest
    steps:
      - name: Download & Install RustDesk
        shell: powershell
        run: |
          # 1. Download the correct x86_64 version for Windows Server
          $url = "https://github.com"
          Invoke-WebRequest -Uri $url -UserAgent "Mozilla/5.0" -OutFile "rustdesk.exe"
          
          # 2. Silent installation as a service
          Start-Process .\rustdesk.exe -ArgumentList "--silent-install" -Wait
          Start-Sleep -Seconds 15

      - name: Configure & Get Credentials
        shell: powershell
        run: |
          cd "C:\Program Files\RustDesk"
          
          # Set a permanent password for the session
          .\rustdesk.exe --password Password123
          Start-Sleep -Seconds 5
          
          # Retrieve the 9-digit connection ID
          $id = .\rustdesk.exe --get-id | Out-String
          
          Write-Host "------------------------------------------------"
          Write-Host "CONNECT VIA BROWSER: https://web.rustdesk.com"
          Write-Host "YOUR ID: $id"
          Write-Host "PASSWORD: Password123"
          Write-Host "------------------------------------------------"

      - name: Keep Runner Alive
        shell: powershell
        run: |
          # Prevents the VM from closing immediately
          while($true) { Start-Sleep -Seconds 60 }
