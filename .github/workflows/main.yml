name: Windows Web RDP via Cloudflare

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Enable Windows Audio & RDP Features
        shell: powershell
        run: |
          # Start Audio Service (Silently ignore if already started)
          Start-Service -Name Audiosrv -ErrorAction SilentlyContinue
          Set-Service -Name Audiosrv -StartupType Automatic
          
          # Force Registry settings for RDP Audio Redirection
          $tsPath = 'HKLM:\System\CurrentControlSet\Control\Terminal Server'
          Set-ItemProperty -Path $tsPath -name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path "$tsPath\WinStations\RDP-Tcp" -name "fDisableAudioCapture" -Value 0
          Set-ItemProperty -Path "$tsPath\WinStations\RDP-Tcp" -name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Set Admin Password
          $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

      - name: Install IIS and ASP.NET Components
        shell: powershell
        run: |
          # Install IIS with ASP.NET 4.8 (Essential for Myrtille)
          Install-WindowsFeature -name Web-Server, Web-Mgmt-Tools, Web-Default-Doc, Web-Dir-Browsing, Web-Http-Errors, Web-Static-Content, Web-Http-Logging, Web-Stat-Compression, Web-Filtering, Web-ISAPI-Filter, Web-ISAPI-Ext, Web-Net-Ext45, Web-Asp-Net45
          
          # Force enable ASP.NET 4.8 via DISM
          dism /online /enable-feature /featurename:IIS-ASPNET45 /all

      - name: Configure IIS Default Document
        shell: powershell
        run: |
          Import-Module WebAdministration
          # Add Default.aspx to the top of the list to fix 403 Forbidden
          if (!(Get-WebConfigurationProperty -pspath 'MACHINE/WEBROOT/APPHOST' -filter "system.webServer/defaultDocument/files" -name "Default.aspx")) {
              Add-WebConfigurationProperty -pspath 'MACHINE/WEBROOT/APPHOST' -filter "system.webServer/defaultDocument/files" -name "." -value @{value='Default.aspx'} -Index 0
          }

      - name: Install Myrtille and Media Tools
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          choco install vlc -y
          
          $url = "https://github.com/cedrozne/myrtille/releases/download/v2.9.1/Myrtille_2.9.1_x64.msi"
          curl.exe -L $url -o Myrtille.msi
          
          if (!(Test-Path C:\inetpub\wwwroot\myrtille)) { New-Item -ItemType Directory -Path C:\inetpub\wwwroot\myrtille }
          
          Start-Process msiexec.exe -ArgumentList "/i Myrtille.msi /quiet /qn /norestart" -Wait
          Start-Sleep -Seconds 30
          
          # Map Application and Restart IIS
          Import-Module WebAdministration
          if (!(Get-WebApplication -Name "myrtille" -Site "Default Web Site")) {
              New-WebApplication -Name "myrtille" -Site "Default Web Site" -PhysicalPath "C:\inetpub\wwwroot\myrtille" -ApplicationPool "DefaultAppPool"
          }
          iisreset

      - name: Setup TryCloudflare & Tunnel
        shell: powershell
        run: |
          curl.exe -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi -o cloudflared.msi
          Start-Process msiexec.exe -ArgumentList "/i cloudflared.msi /quiet /qn" -Wait
          
          Write-Host "Starting TryCloudflare tunnel..."
          $logFile = "cloudflared_err.log"
          Start-Process "C:\Program Files (x86)\cloudflared\cloudflared.exe" -ArgumentList "tunnel --url http://localhost:80" -RedirectStandardError $logFile
          
          $maxRetries = 20
          $retryCount = 0
          $url = ""
          while ($url -eq "" -and $retryCount -lt $maxRetries) {
              Start-Sleep -Seconds 5
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile
                  $line = $content | Select-String -Pattern "https://.*\.trycloudflare\.com"
                  if ($line) {
                      $url = [regex]::Match($line, "https://.*\.trycloudflare\.com").Value
                  }
              }
              $retryCount++
              Write-Host "Waiting for Cloudflare URL... (Attempt $retryCount)"
          }

          if ($url -ne "") {
              Write-Host "=========================================="
              Write-Host "ACCESS YOUR WINDOWS WEB RDP AT:"
              Write-Host "$url/myrtille/"
              Write-Host "USER: runneradmin | PASS: P@ssw0rd123!"
              Write-Host "=========================================="
          }
          
          $i = 0
          while($i -lt 360) {
            Start-Sleep -Seconds 60
            $i++
            if ($i % 10 -eq 0) { Write-Host "Session active... Minute: $i" }
          }
