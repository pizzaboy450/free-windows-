name: Windows noVNC Universal Bridge

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Install VNC and Node.js
        shell: powershell
        run: |
          choco install tightvnc nodejs -y
          # Set VNC Password to 'password'
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlservice -setpassword "password"
          
          # Fix the Loopback issue directly in Registry
          $regPath = "HKLM:\Software\TightVNC\Server"
          if (!(Test-Path $regPath)) { New-Item -Path $regPath -Force }
          Set-ItemProperty -Path $regPath -Name "AllowLoopback" -Value 1 -Type DWord
          
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlservice -start

      - name: Setup WebSocket Proxy
        shell: powershell
        run: |
          npm install -g websockify
          # Start proxy: Port 8080 -> VNC Port 5900
          Start-Process websockify -ArgumentList "8080 localhost:5900" -WindowStyle Hidden
          Start-Sleep -Seconds 10

      - name: Start ngrok Tunnel
        shell: powershell
        run: |
          choco install ngrok -y
          ngrok config add-authtoken "3BMSLAeag3NtqgcVomW5yxeLFSm_5KhWqGvnpUoumm5MWwu1L"
          
          # Start a TCP tunnel for the WebSocket bridge
          Start-Process ngrok -ArgumentList "tcp 8080"
          
          # Wait longer this time to avoid the 'Unable to connect' error
          Start-Sleep -Seconds 20
          
          $ngrokApi = Invoke-WebRequest -Uri http://localhost:4040/api/tunnels -UseBasicParsing | ConvertFrom-Json
          $address = $ngrokApi.tunnels[0].public_url -replace "tcp://", ""
          $hostName = $address.Split(':')[0]
          $port = $address.Split(':')[1]
          
          Write-Host "=========================================="
          Write-Host "HOW TO CONNECT USING noVNC DEMO:"
          Write-Host "1. Go to: https://novnc.com/noVNC/vnc.html"
          Write-Host "2. Click 'Settings' (Gear Icon)"
          Write-Host "3. Change 'Transport' to 'WebSockets' (NOT Encrypted/WSS)"
          Write-Host "4. Host: $hostName"
          Write-Host "5. Port: $port"
          Write-Host "6. Click CONNECT and use password: password"
          Write-Host "=========================================="
          
          while($true) { Start-Sleep -Seconds 60 }
