name: Windows TigerVNC Auto-Path Fix

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Install VNC and Python Tools
        shell: powershell
        run: |
          # 1. Install TigerVNC and Python
          choco install tigervnc python -y
          refreshenv
          python -m pip install websockify
          
      - name: Locate and Start VNC
        shell: powershell
        run: |
          # 2. Find the VNC executable (it moves depending on version)
          $vncExe = (Get-ChildItem -Path "C:\Program Files" -Recurse -Include "vncserver.exe", "winvnc.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          
          if ($null -eq $vncExe) {
              Write-Error "Could not find VNC executable in Program Files."
              exit 1
          }
          
          Write-Host "Found VNC at: $vncExe"
          
          # 3. Start TigerVNC as a user process
          # SecurityTypes=None bypasses the 'Invalid Password' wall
          Start-Process $vncExe -ArgumentList "-SecurityTypes None -localhost 1" -WindowStyle Hidden
          Start-Sleep -Seconds 10

      - name: Setup WebSocket Proxy
        shell: powershell
        run: |
          # 4. Start bridge: Web(8080) -> VNC(5901 or 5900)
          # TigerVNC usually starts at 5901 for the first display
          Start-Process python -ArgumentList "-m websockify 8080 localhost:5901" -WindowStyle Hidden
          Start-Sleep -Seconds 5
          
          # Health Check: Try 5900 if 5901 isn't responding
          $check = Test-NetConnection -ComputerName 127.0.0.1 -Port 5901
          if (!$check.TcpTestSucceeded) {
              Write-Host "Port 5901 closed, trying 5900..."
              Stop-Process -Name "python" -ErrorAction SilentlyContinue
              Start-Process python -ArgumentList "-m websockify 8080 localhost:5900" -WindowStyle Hidden
          }

      - name: Setup TryCloudflare Tunnel
        shell: powershell
        run: |
          curl.exe -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi -o cloudflared.msi
          Start-Process msiexec.exe -ArgumentList "/i cloudflared.msi /quiet /qn" -Wait
          
          Write-Host "Starting Tunnel..."
          $logFile = "cloudflared_err.log"
          Start-Process "C:\Program Files (x86)\cloudflared\cloudflared.exe" -ArgumentList "tunnel --url http://127.0.0.1:8080" -RedirectStandardError $logFile
          
          $maxRetries = 20
          $url = ""
          while ($url -eq "" -and $retryCount -lt $maxRetries) {
              Start-Sleep -Seconds 5
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile
                  $line = $content | Select-String -Pattern "https://.*\.trycloudflare\.com"
                  if ($line) { $url = [regex]::Match($line, "https://.*\.trycloudflare\.com").Value }
              }
              $retryCount++
          }

          if ($url -ne "") {
              $wsHost = $url -replace "https://", ""
              Write-Host "=========================================="
              Write-Host "CONNECT VIA noVNC DEMO:"
              Write-Host "1. Go to: https://novnc.com/noVNC/vnc.html"
              Write-Host "2. Settings -> Transport: WebSockets"
              Write-Host "3. Host: $wsHost"
              Write-Host "4. Port: 443 | Encrypt: Checked"
              Write-Host "5. Password: [NONE/BLANK]"
              Write-Host "=========================================="
          }
          
          while($true) { Start-Sleep -Seconds 60 }
