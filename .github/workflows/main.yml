name: RustDesk No-Login Stream
on: 
  workflow_dispatch:

jobs:
  stream:
    runs-on: windows-latest
    steps:
      - name: Download and Setup RustDesk
        shell: powershell
        run: |
          # Download RustDesk
          $url = "https://github.com"
          Invoke-WebRequest -Uri $url -OutFile "rustdesk.exe"
          
          # Start RustDesk and set a password (change 'Password123' if desired)
          Start-Process .\rustdesk.exe --install
          Start-Sleep -Seconds 10
          .\rustdesk.exe --set-password Password123
          
          # Get the ID from the RustDesk config to display in logs
          Write-Host "------------------------------------------------"
          Write-Host "YOUR CONNECTION ID WILL APPEAR BELOW (May take a moment)"
          $id = .\rustdesk.exe --get-id
          Write-Host "ID: $id"
          Write-Host "PASSWORD: Password123"
          Write-Host "------------------------------------------------"

      - name: Keep Runner Alive
        shell: powershell
        run: |
          while($true) { Start-Sleep -Seconds 60 }
