name: Full Windows VM Browser Stream
on: workflow_dispatch

jobs:
  stream:
    runs-on: windows-latest
    steps:
      - name: Install RustDesk
        shell: powershell
        run: |
          choco install rustdesk -y --no-progress
          Start-Sleep -Seconds 15

      - name: Force Start & Get ID
        shell: powershell
        run: |
          $rd_path = "C:\Program Files\RustDesk\rustdesk.exe"
          
          # 1. Ensure the service is running
          Write-Host "Starting RustDesk Service..."
          Start-Service -Name "RustDesk" -ErrorAction SilentlyContinue
          
          # 2. Set the password
          & $rd_path --password Password123
          Start-Sleep -Seconds 5

          # 3. Aggressive loop to get the ID (Retries for 2 minutes)
          Write-Host "Waiting for Network ID..."
          $id = ""
          for ($i=1; $i -le 24; $i++) {
              $id = (& $rd_path --get-id)
              # Clean the output (remove spaces/newlines)
              $id = $id.Trim()
              
              if ($id -match '^\d+$') { 
                  Write-Host "SUCCESS: ID Found!"
                  break 
              }
              
              Write-Host "Attempt $i: ID is still blank. Waiting 5 seconds..."
              Start-Sleep -Seconds 5
          }

          if (-not $id) {
              Write-Error "Could not retrieve ID. The service might be blocked by a firewall."
              exit 1
          }
          
          Write-Host "------------------------------------------------"
          Write-Host "CONNECT VIA BROWSER: https://web.rustdesk.com"
          Write-Host "YOUR ID: $id"
          Write-Host "PASSWORD: Password123"
          Write-Host "------------------------------------------------"

      - name: Keep Runner Alive
        shell: powershell
        run: |
          $timeout = New-TimeSpan -Hours 6
          $sw = [diagnostics.stopwatch]::StartNew()
          while ($sw.Elapsed -lt $timeout) {
              Write-Host "Runner Active - $(Get-Date)"
              Start-Sleep -Seconds 60
          }
