name: Direct RDP (No Browser Errors)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Enable Windows RDP & User
        shell: powershell
        run: |
          # 1. Enable RDP and Firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 2. Set Password for 'runneradmin'
          $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          
          # 3. Enable Audio Redirection
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "fDisableAudioCapture" -Value 0

      - name: Start ngrok TCP Tunnel
        shell: powershell
        run: |
          # Install and Authenticate ngrok
          choco install ngrok -y
          # USE YOUR TOKEN:
          ngrok config add-authtoken "3BMSLAeag3NtqgcVomW5yxeLFSm_5KhWqGvnpUoumm5MWwu1L"
          
          # Start a RAW TCP tunnel (No HTTP/URL logic involved)
          Start-Process ngrok -ArgumentList "tcp 3389"
          Start-Sleep -Seconds 10
          
          # Get the TCP Address from ngrok API
          $ngrokApi = Invoke-WebRequest -Uri http://localhost:4040/api/tunnels -UseBasicParsing | ConvertFrom-Json
          $address = $ngrokApi.tunnels[0].public_url -replace "tcp://", ""
          
          Write-Host "=========================================="
          Write-Host "CONNECT USING WINDOWS REMOTE DESKTOP APP:"
          Write-Host "COMPUTER ADDRESS: $address"
          Write-Host "USERNAME: runneradmin"
          Write-Host "PASSWORD: P@ssw0rd123!"
          Write-Host "=========================================="
          
          # 6-Hour Keep-Alive
          $i = 0
          while($i -lt 360) {
            Start-Sleep -Seconds 60
            $i++
          }
