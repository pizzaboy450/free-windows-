name: Windows noVNC Fixed

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Install VNC and noVNC
        shell: powershell
        run: |
          # 1. Install TightVNC
          choco install tightvnc -y
          
          # 2. Set VNC Password to 'password'
          # Using the hex-encoded version of 'password' to force it into registry
          $passHex = "70,61,73,73,77,6f,72,64,00,00,00,00"
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlservice -setpassword "password"
          & "C:\Program Files\TightVNC\tvnserver.exe" -controlservice -start
          
          # 3. Download noVNC (Portable Version)
          mkdir C:\noVNC
          Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip" -OutFile "C:\novnc.zip"
          Expand-Archive -Path "C:\novnc.zip" -DestinationPath "C:\noVNC"
          
          # 4. Install Node.js and Websockify (The Proxy)
          choco install nodejs -y
          npm install -g websockify

      - name: Start noVNC Service
        shell: powershell
        run: |
          # Start Websockify: Port 8080 (Web) -> Port 5900 (VNC)
          # We point the webroot to the extracted noVNC folder
          $vncPath = Get-ChildItem -Path "C:\noVNC\noVNC-*" | Select-Object -ExpandProperty FullName
          Start-Process "websockify" -ArgumentList "8080 localhost:5900 --web $vncPath" -WindowStyle Hidden
          
          # Wait for it to wake up
          Start-Sleep -Seconds 10
          
          # Test if the port is open locally (Prevention of 502)
          $check = Test-NetConnection -ComputerName localhost -Port 8080
          if ($check.TcpTestSucceeded) {
              Write-Host "Local noVNC server is UP on port 8080."
          } else {
              Write-Error "Local noVNC server failed to start."
              exit 1
          }

      - name: Setup TryCloudflare Tunnel
        shell: powershell
        run: |
          curl.exe -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi -o cloudflared.msi
          Start-Process msiexec.exe -ArgumentList "/i cloudflared.msi /quiet /qn" -Wait
          
          Write-Host "Starting TryCloudflare tunnel..."
          $logFile = "cloudflared_err.log"
          Start-Process "C:\Program Files (x86)\cloudflared\cloudflared.exe" -ArgumentList "tunnel --url http://localhost:8080" -RedirectStandardError $logFile
          
          $maxRetries = 20
          $retryCount = 0
          $url = ""
          while ($url -eq "" -and $retryCount -lt $maxRetries) {
              Start-Sleep -Seconds 5
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile
                  $line = $content | Select-String -Pattern "https://.*\.trycloudflare\.com"
                  if ($line) { $url = [regex]::Match($line, "https://.*\.trycloudflare\.com").Value }
              }
              $retryCount++
              Write-Host "Waiting for Cloudflare URL... (Attempt $retryCount)"
          }

          if ($url -ne "") {
              Write-Host "=========================================="
              Write-Host "ACCESS YOUR WINDOWS VNC AT:"
              Write-Host "$url/vnc.html?autoconnect=true&password=password"
              Write-Host "=========================================="
          }
          
          while($true) { Start-Sleep -Seconds 60 }
