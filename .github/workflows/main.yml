name: Full Windows VM Browser Stream
on: workflow_dispatch

jobs:
  stream:
    runs-on: windows-latest
    steps:
      - name: Download & Install RustDesk
        shell: powershell
        run: |
          # 1. Using direct GitHub release link (v1.3.7 as of now)
          $url = "https://github.com/rustdesk/rustdesk/releases/download/1.3.7/rustdesk-1.3.7-x86_64.exe"
          Invoke-WebRequest -Uri $url -UserAgent "Mozilla/5.0" -OutFile "rustdesk.exe"
          
          # 2. Install silently
          Start-Process .\rustdesk.exe -ArgumentList "--silent-install" -Wait
          Start-Sleep -Seconds 10

      - name: Configure & Get Credentials
        shell: powershell
        run: |
          $rd_path = "C:\Program Files\RustDesk\rustdesk.exe"
          
          # Set a permanent password
          # Note: In newer versions, '--password' might need the service restarted
          Start-Process $rd_path -ArgumentList "--password Password123" -Wait
          
          # Small loop to ensure the ID is generated by the service
          $id = ""
          for ($i=0; $i -lt 10; $i++) {
              $id = & $rd_path --get-id
              if ($id) { break }
              Start-Sleep -Seconds 3
          }
          
          Write-Host "------------------------------------------------"
          Write-Host "CONNECT VIA BROWSER: https://web.rustdesk.com"
          Write-Host "YOUR ID: $id"
          Write-Host "PASSWORD: Password123"
          Write-Host "------------------------------------------------"

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "Runner is active. The job will auto-cancel after 6 hours (GitHub limit)."
          for ($i=0; $i -lt 360; $i++) {
             Write-Host "Heartbeat: $(Get-Date)"
             Start-Sleep -Seconds 60
          }
